name = "adaptive_curriculum_v1"

[dataset]
root = "datasets/curricula/adaptive_curriculum_v1"
samples_per_grade = 1000
sample_time = 5
freq_bins = 1024
time_frames = 512
fft_size_multiplier = 4
workers = 8
min_note_frequency = 55.0
max_note_frequency = 440.0

[training]
